<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Source Management</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="popup-shell">
        <div class="popup-header">
            <img class="popup-icon" src="../assets/icons/icon48.png" alt="">
            <div class="popup-header-copy">
                <p class="popup-eyebrow" id="popup-badge"></p>
                <h1 class="popup-title" id="popup-title"></h1>
            </div>
        </div>

        <p class="popup-body" id="popup-body"></p>
        <p class="popup-note" id="popup-note"></p>
        <p class="popup-detail" id="popup-detail" hidden></p>

        <button class="popup-button" id="popup-primary-btn" type="button"></button>
    </main>

    <script src="./index.js"></script>
</body>
</html>
